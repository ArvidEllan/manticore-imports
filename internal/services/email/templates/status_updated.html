<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Update</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;color:#1a1a2e;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6f8;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <tr>
            <td style="background:#1a1a2e;padding:24px 32px;">
              <h1 style="margin:0;color:#ffffff;font-size:22px;">Manticore Imports</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;">Request status updated</h2>
              <p style="margin:0 0 16px;line-height:1.6;">Hi {{.CustomerName}},</p>
              <p style="margin:0 0 16px;line-height:1.6;">Your import request <strong>{{.Reference}}</strong> has been updated.</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#ecfdf5;border-radius:6px;margin:24px 0;border-left:4px solid #10b981;">
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0 0 4px;font-size:13px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;">New status</p>
                    <p style="margin:0;font-size:18px;font-weight:bold;color:#065f46;">{{.Status}}</p>
                  </td>
                </tr>
              </table>
              <p style="margin:0;line-height:1.6;color:#6b7280;font-size:14px;">Log in to the status page with your reference and email for full details.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background:#f8f9fb;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">&copy; Manticore Imports. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
